<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searchpage</title>
    <link rel="stylesheet" href="./CSS/afterSearch.css">
    <script src="./JS/theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="./index.html">
                <img src="./Image/fork-and-spoon-meal-svgrepo-com.svg" alt="" height="25px">
                <h2>Meal Master</h2>
            </a>
        </div>
        <div class="middleColumn">
            <div class="list">
                <a href="">
                    <img src="./Image/home-icon-silhouette-svgrepo-com.svg" alt="" height="25px">
                    <h2>Home</h2>
                </a>
            </div>
            <div class="list">
                <a href="">
                    <img src="./Image/discover-compass-svgrepo-com.svg" alt="" height="25px">
                    <h2>Explore</h2>
                </a>
            </div>
            <div class="list">
                <a href="">
                    <img src="./Image/list-svgrepo-com.svg" alt="" height="25px">
                    <h2>Ingridents</h2>
                </a>
            </div>
            <div class="list">
                <a href="">
                    <img src="./Image/category-svgrepo-com.svg" alt="" height="25px">
                    <h2>Category</h2>
                </a>
            </div>
        </div>
        
        <div class="leftColumn">
            <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
        </div>
    </nav>

    <div class="layout">

    <aside class="sidebar">
        <h3>SEARCH</h3>
        <input type="text" placeholder="Recipe name..." class="searchInput" id="afterSearchInputSection">

        <h3>SORT BY</h3>
        <div class="radioGroup">
            <label><input type="radio" name="sort" checked> Name (Z-A)</label>
        </div>

        <h3>CUISINE</h3>
        <ul id="cuisineList">
            <button id="btn">All</button>
        </ul>
    </aside>

    <section id="searchResult" class="searchResult"></section> 

    <div id="loadingScreen" class="loadingScreen" style="display: none;">
        <div class="spinner"></div>
        <p>Loading dishes...</p>
    </div>
</div>
    <script src="./JS/script.js"></script>
</body>
</html>
