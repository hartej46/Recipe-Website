<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./CSS/index.css">
    <script src="./JS/theme.js"></script>
    <title>Document</title>
</head>
<body>
   <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="brand">
                <img src="./Image/fork-and-spoon-meal-svgrepo-com.svg" alt="" height="25px">
                <h2>Meal Master</h2>
            </a>
            <div class="nav-links">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="#">Discover</a>
                <a class="nav-link" href="#">Ingredients</a>
                <a class="nav-link" href="#">Categories</a>
            </div>
            <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
        </div>
    </nav>


    <section class="container">
        <div class="hero">
            
            <div class="bg">
                <img id="chefsSpecialImage" src="" alt="Food Image">
                <div class="upper"></div>
            </div>

            <div class="content">
                <div class="choice">
                    Chef's Choice
                </div>

                <h1 id="title">
                   
                </h1>

                <p id="shortDescription">
                    
                </p>

                <button class="recipeButton" onclick="recipeDetails()">
                    View Full Recipe →
                </button>
            </div>

        </div>
    </section>

        <section class="search">
            <div class="searchBox">

            <div  class="input">
                <input id="nameOrIngridents" type="text" placeholder="Search by name or ingredient (e.g. Saffron, Salmon...)">
            </div>

            <button class="explore" onclick="search()">Explore</button>

        </div>
    </section>

    <section class="most-loved">
        <div class="most-loved-container">
            <div class="most-loved-header">
                <div>
                    <h2 class="title">Most Loved</h2>
                    <p class="subtitle">
                        Top rated by our global community of chefs.
                    </p>
                </div>
                <a href="#" class="view-all">
                    View all 
                    <span class="material-symbols-outlined" style="font-size: 16px;">open_in_new</span>
                </a>
            </div>
            
            <div id="mostLovedGrid" class="recipes-grid">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>

    <section class="crave-section">
        <div class="most-loved-container">
            <h2 class="section-title">You Might Also Crave...</h2>
            <div id="craveGrid" class="recipes-grid">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>


    <footer class="footer">
    <div class="footer-container">
        
        <div class="logo">
        Culinary Gallery
        </div>

        <div class="footer-links">
        <a href="#">About Us</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Chef's Terms</a>
        <a href="#">Contact</a>
        </div>

        <div class="footer-text">
        © 2024 Culinary Gallery. Designed for the Modern Palate.
        </div>

    </div>
    </footer>
    <script src="./JS/script.js"></script>
</body>
</html>
